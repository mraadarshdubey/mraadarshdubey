name: Live profile (weather · time · AI thought)

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-live
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate live profile
        env:
          # Optional — add this repo secret to get a REAL AI-written thought.
          # Without it, a curated thought rotates daily instead.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/update_profile.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/footer.svg README.md
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: refresh live profile (weather · time · thought) [skip ci]"
            git push
          fi
